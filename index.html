<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>รายงานผลการปฏิบัติงาน</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&family=Mitr:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--f:#14532d;--fm:#166534;--fl:#22c55e;--fp:#dcfce7;--fg:#f0fdf4;--g:#92400e;--gl:#d97706;--gp:#fef3c7;--gg:#fffbeb;--bg:#f8faf8;--ww:#ffffff;--tx:#111827;--tm:#4b5563;--ts:#9ca3af;--mu:#d1d5db;--bd:#e5e7eb;--bl:#f3f4f6;--cd:#ffffff;--red:#dc2626;--redp:#fef2f2;--ss:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);--sm:0 4px 6px rgba(0,0,0,.05),0 2px 4px rgba(0,0,0,.03);--sl:0 20px 40px rgba(0,0,0,.08),0 8px 16px rgba(0,0,0,.04);--r:16px;--rs:10px;--rx:6px;--e:.25s cubic-bezier(.4,0,.2,1);--eb:.4s cubic-bezier(.34,1.56,.64,1)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans Thai',sans-serif;background:var(--bg);color:var(--tx);line-height:1.8;font-size:15px;-webkit-font-smoothing:antialiased}
::selection{background:var(--fp);color:var(--f)}

.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(24px);padding:12px 32px;border-radius:60px;font-family:'Mitr',sans-serif;font-size:14px;box-shadow:var(--sl);z-index:3000;opacity:0;transition:var(--eb);pointer-events:none;background:var(--f);color:#fff}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.fab{position:fixed;bottom:28px;right:28px;z-index:1000;width:56px;height:56px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--f),var(--fm));color:#fff;cursor:pointer;box-shadow:0 8px 24px rgba(20,83,45,.3);transition:var(--eb);display:flex;align-items:center;justify-content:center;opacity:.12}
.fab:hover{opacity:1;transform:scale(1.08) rotate(-5deg);box-shadow:0 12px 32px rgba(20,83,45,.4)}
.fab svg{width:22px;height:22px}
body.editing .fab{display:none}

.ov{display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.4);backdrop-filter:blur(12px);align-items:center;justify-content:center;padding:20px}
.ov.show{display:flex}
.mb{background:var(--cd);border-radius:20px;padding:32px;width:100%;max-width:440px;box-shadow:var(--sl);animation:su .35s var(--eb)}
.mb h3{font-family:'Mitr',sans-serif;font-size:18px;font-weight:500;color:var(--f);margin-bottom:4px}
.mb .mdesc{font-size:13px;color:var(--ts);margin-bottom:20px}
.mb label{font-size:11px;font-weight:600;color:var(--tm);display:block;margin-bottom:3px;letter-spacing:.3px;text-transform:uppercase}
.mb input,.mb select,.mb textarea{width:100%;padding:10px 14px;border:1.5px solid var(--bd);border-radius:var(--rs);font-family:inherit;font-size:14px;outline:none;transition:var(--e);margin-bottom:12px;background:var(--bl)}
.mb input:focus,.mb select:focus,.mb textarea:focus{border-color:var(--fl);background:#fff;box-shadow:0 0 0 4px rgba(34,197,94,.12)}
.mb .er{font-size:12px;color:var(--red);margin-bottom:8px;min-height:15px}
.mba{display:flex;gap:8px;margin-top:4px}
.mba button{flex:1;padding:11px;border-radius:var(--rs);font-family:'Mitr',sans-serif;font-size:13px;font-weight:400;cursor:pointer;transition:var(--e);border:none}
.bc{background:var(--bl);color:var(--tm)}.bc:hover{background:var(--bd)}
.bu{background:var(--f);color:#fff}.bu:hover{background:var(--fm)}
.bgo{background:var(--gl);color:#fff}.bgo:hover{background:var(--g)}

.ebar{display:none;position:sticky;top:0;z-index:900;background:linear-gradient(135deg,var(--f) 0%,#15803d 100%);color:#fff;padding:10px 24px;align-items:center;justify-content:space-between;gap:10px;box-shadow:0 4px 24px rgba(20,83,45,.25);flex-wrap:wrap}
body.editing .ebar{display:flex}
.ebl{display:flex;align-items:center;gap:8px;font-family:'Mitr',sans-serif;font-size:13px;font-weight:300}
.ebl .dot{width:8px;height:8px;border-radius:50%;background:#4ade80;box-shadow:0 0 8px #4ade80;animation:pu 2s ease infinite}
.eba{display:flex;gap:6px;flex-wrap:wrap}
.bb{padding:7px 16px;border-radius:8px;border:none;font-family:'Mitr',sans-serif;font-size:12px;font-weight:400;cursor:pointer;transition:var(--e);white-space:nowrap}
.bsv{background:rgba(74,222,128,.2);color:#bbf7d0;border:1px solid rgba(74,222,128,.3)}.bsv:hover{background:rgba(74,222,128,.35)}
.bex{background:rgba(255,255,255,.1);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.15)}.bex:hover{background:rgba(255,255,255,.2)}
.bst{background:rgba(217,119,6,.2);color:#fde68a;border:1px solid rgba(217,119,6,.3)}
.bsh{background:rgba(59,130,246,.2);color:#bfdbfe;border:1px solid rgba(59,130,246,.3)}
.bpl{background:rgba(139,92,246,.2);color:#ddd6fe;border:1px solid rgba(139,92,246,.3)}

.ed{transition:var(--e);white-space:pre-wrap}
body.editing .ed{background:rgba(254,243,199,.4);border:1.5px dashed var(--gl);border-radius:var(--rx);padding:5px 10px;cursor:text;outline:none;min-height:1.6em;display:block}
body.editing .ed:focus{background:#fff;border-color:var(--fl);border-style:solid;box-shadow:0 0 0 4px rgba(34,197,94,.1)}
body.editing .ed:empty::before{content:attr(data-ph);color:var(--mu);font-style:italic;font-weight:300}

.hero{background:linear-gradient(160deg,#14532d 0%,#166534 35%,#15803d 70%,#16a34a 100%);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
.hero::after{content:'';position:absolute;bottom:-60px;right:-40px;width:300px;height:300px;background:radial-gradient(circle,rgba(217,119,6,.15) 0%,transparent 70%);border-radius:50%}
.hi{max-width:880px;margin:0 auto;padding:56px 28px 48px;position:relative;z-index:1;color:#fff}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);padding:6px 16px;border-radius:24px;font-size:12px;margin-bottom:20px;backdrop-filter:blur(8px)}
.hero-badge span{width:6px;height:6px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px #4ade80}
.hero h1{font-family:'Mitr',sans-serif;font-size:clamp(24px,5vw,36px);font-weight:500;line-height:1.3;margin-bottom:6px}
.hst{font-size:15px;opacity:.8;font-weight:300;margin-bottom:24px;max-width:600px}
.hch{display:flex;flex-wrap:wrap;gap:8px}
.ch{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);padding:6px 16px;border-radius:24px;font-size:13px;font-weight:300;transition:var(--e);backdrop-filter:blur(4px)}
.ch:hover{background:rgba(255,255,255,.15)}

.nw{max-width:880px;margin:-24px auto 0;padding:0 28px;position:relative;z-index:10}
.nb{display:flex;background:var(--cd);border-radius:var(--r);box-shadow:var(--sl);border:1px solid rgba(0,0,0,.05);padding:5px;gap:4px;overflow-x:auto;scrollbar-width:none}
.nb::-webkit-scrollbar{display:none}
.nt{flex:none;padding:10px 20px;border:none;background:transparent;border-radius:var(--rs);font-family:'Mitr',sans-serif;font-size:13px;font-weight:300;color:var(--tm);cursor:pointer;transition:var(--e);white-space:nowrap;position:relative;user-select:none}
.nt:hover{background:var(--fg);color:var(--f)}
.nt.active{background:linear-gradient(135deg,var(--f),var(--fm));color:#fff;font-weight:400;box-shadow:0 2px 12px rgba(20,83,45,.2)}
/* Tab arrows — edit mode ONLY */
.tab-arrows{display:none;position:absolute;top:-4px;right:-4px;gap:2px;z-index:5}
body.editing .nt .tab-arrows{display:flex}
body.editing .nt{cursor:grab;padding-right:28px}
.tab-arr{width:20px;height:20px;border-radius:50%;background:var(--fl);color:#fff;border:2px solid #fff;cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;transition:var(--e);line-height:1;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.tab-arr:hover{background:var(--f);transform:scale(1.15)}
.tab-del{background:var(--red)}.tab-del:hover{background:#991b1b}

.mn{max-width:880px;margin:28px auto;padding:0 28px 100px}
.tp{display:none;animation:fi .3s ease}.tp.active{display:block}

.stt{display:flex;align-items:center;gap:14px;margin-bottom:24px;padding-bottom:18px;border-bottom:2px solid var(--fp)}
.sti{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,var(--f),#16a34a);display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;font-size:22px;box-shadow:0 6px 16px rgba(20,83,45,.2)}
.stt h2{font-family:'Mitr',sans-serif;font-size:20px;font-weight:500;color:var(--f)}
.stt p{font-size:13px;color:var(--ts);font-weight:300}

.card{background:var(--cd);border-radius:var(--r);box-shadow:var(--ss);border:1px solid rgba(0,0,0,.04);margin-bottom:24px;overflow:hidden;transition:var(--e)}
.card:hover{box-shadow:var(--sm);transform:translateY(-2px)}
.ct{display:flex;align-items:center;gap:12px;padding:14px 20px;background:linear-gradient(135deg,var(--fg),var(--fp));border-bottom:1px solid rgba(34,197,94,.1)}
.cn{min-width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--f),var(--fm));color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;box-shadow:0 2px 8px rgba(20,83,45,.15)}
.ct h3{font-family:'Mitr',sans-serif;font-size:14px;font-weight:400;color:var(--f);flex:1}
.cba{display:none;gap:3px}.cba button{width:26px;height:26px;border:none;border-radius:6px;font-size:11px;cursor:pointer;transition:var(--e);display:flex;align-items:center;justify-content:center;background:rgba(20,83,45,.08);color:var(--f)}
.cba button:hover{background:rgba(20,83,45,.15);transform:scale(1.1)}
.cba .del-btn{color:var(--red);background:var(--redp)}.cba .del-btn:hover{background:#fecaca}
body.editing .cba{display:flex}
.cbody{padding:20px}

.ig{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
.ic{padding:14px 16px;background:var(--bg);border-radius:var(--rs);border:1px solid var(--bd);transition:var(--e)}
.ic:hover{border-color:var(--fl);box-shadow:0 2px 8px rgba(34,197,94,.08)}
.ic .fl{font-family:'Mitr',sans-serif;font-size:10px;font-weight:400;color:var(--fl);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.ic .iv{font-size:15px;font-weight:500}

.fl{font-family:'Mitr',sans-serif;font-size:10px;font-weight:400;color:var(--fl);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.rb{margin-top:14px;padding:14px 18px;background:linear-gradient(135deg,var(--gg),var(--gp));border-left:3px solid var(--gl);border-radius:0 var(--rs) var(--rs) 0}
.rb .fl{color:var(--gl)}

.cli{padding:12px 0;border-bottom:1px solid var(--bl)}.cli:last-child{border-bottom:none}
.clh{display:flex;align-items:flex-start;gap:10px;margin-bottom:4px}
.cln{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--f),var(--fm));color:#fff;font-family:'Mitr',sans-serif;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;box-shadow:0 2px 6px rgba(20,83,45,.15)}
.clt{font-family:'Mitr',sans-serif;font-size:14px;font-weight:400;color:var(--f)}
.cld{padding-left:38px;font-size:13px;color:var(--tm);font-weight:300}

.bk-header{padding:24px;background:linear-gradient(135deg,var(--gg),var(--gp));border-left:4px solid var(--gl);border-radius:var(--r);margin-bottom:24px;position:relative;overflow:hidden}
.bk-header::after{content:'';position:absolute;top:-20px;right:-20px;width:100px;height:100px;background:radial-gradient(circle,rgba(217,119,6,.1),transparent 70%);border-radius:50%}
.bk-header h3{font-family:'Mitr',sans-serif;font-size:17px;font-weight:500;color:var(--g);margin-bottom:4px;position:relative}
.bk-header p{font-size:14px;color:var(--tm);font-weight:300;position:relative}

/* ══ IMAGES — FULLY WORKING ══ */
.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-top:12px}
.img-slot{position:relative;border-radius:var(--rs);overflow:hidden;background:var(--bl);border:2px dashed var(--bd);aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;transition:var(--e);cursor:default}
.img-slot:hover{border-color:var(--fl)}
.img-slot.has-img{border-style:solid;border-color:transparent}
.img-slot img{width:100%;height:100%;object-fit:cover;transition:var(--e)}
.img-slot img:hover{transform:scale(1.03)}
.img-ph{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--ts);font-size:12px;font-weight:300;padding:16px;text-align:center}
.img-ph svg{width:36px;height:36px;stroke:var(--mu);stroke-width:1.5;fill:none}
/* Upload overlay — shows on hover in edit mode on existing images */
.img-overlay{position:absolute;inset:0;background:rgba(20,83,45,.85);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;font-family:'Mitr',sans-serif;font-size:13px;font-weight:300;opacity:0;transition:var(--e);pointer-events:none;border-radius:var(--rs);backdrop-filter:blur(4px)}
.img-overlay svg{width:32px;height:32px;stroke:#fff;stroke-width:1.5;fill:none}
body.editing .has-img:hover .img-overlay{opacity:1;pointer-events:auto;cursor:pointer}
/* Delete button — edit mode only on images that exist */
.img-x{position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:50%;background:rgba(220,38,38,.9);color:#fff;border:2px solid #fff;cursor:pointer;font-size:14px;display:none;align-items:center;justify-content:center;transition:var(--e);box-shadow:0 2px 8px rgba(0,0,0,.3);z-index:5}
.img-x:hover{transform:scale(1.15);background:#dc2626}
body.editing .has-img .img-x{display:flex}
/* Upload placeholder slot — styled as dashed box, cursor pointer */
.img-slot-upload{border:2px dashed var(--fl);background:var(--fg);cursor:pointer!important}
.img-slot-upload:hover{background:var(--fp);border-color:var(--f)}
/* Drop zone highlight */
.img-slot.dragover{border-color:var(--fl)!important;border-style:solid!important;background:var(--fg)!important}
.img-slot.dragover .img-ph{color:var(--f)}
.img-slot.dragover .img-ph svg{stroke:var(--fl)}

.add-block-area{display:none;margin:20px 0;text-align:center}
body.editing .add-block-area{display:block}
.add-block-btn{padding:14px 32px;border:2px dashed var(--fl);border-radius:var(--r);background:var(--fg);color:var(--f);font-family:'Mitr',sans-serif;font-size:13px;cursor:pointer;transition:var(--e)}
.add-block-btn:hover{background:var(--fp);border-color:var(--f);transform:translateY(-2px);box-shadow:var(--sm)}
.add-inline{display:none;margin-top:8px}
body.editing .add-inline{display:block}
.add-inline-btn{padding:6px 16px;border:1.5px dashed var(--fl);border-radius:8px;background:transparent;color:var(--fl);font-family:'Mitr',sans-serif;font-size:11px;cursor:pointer;transition:var(--e)}
.add-inline-btn:hover{background:var(--fg)}

/* ══ LIGHTBOX ══ */
.lbox{display:none;position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,.92);align-items:center;justify-content:center;cursor:zoom-out;backdrop-filter:blur(4px);flex-direction:column;gap:16px}
.lbox.show{display:flex}
.lbox img{max-width:94%;max-height:85vh;border-radius:12px;box-shadow:0 0 80px rgba(0,0,0,.5);animation:su .3s ease;object-fit:contain}
.lbox-close{position:absolute;top:20px;right:20px;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--e)}
.lbox-close:hover{background:rgba(255,255,255,.3);transform:scale(1.1)}
.lbox-info{color:rgba(255,255,255,.6);font-size:13px;font-family:'Mitr',sans-serif}

@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes su{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes pu{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

/* ══ RESPONSIVE — TABLET ══ */
@media(max-width:768px){
  .hi{padding:40px 20px 36px}
  .nw,.mn{padding-left:16px;padding-right:16px}
  .hero h1{font-size:22px}
  .hst{font-size:13px}
  .ig{grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}
  .img-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
  .stt h2{font-size:17px}
  .sti{width:40px;height:40px;font-size:18px}
  .ct{padding:12px 14px}
  .cbody{padding:14px}
  .card{border-radius:12px;margin-bottom:16px}
  .ebar{padding:8px 14px}
}

/* ══ RESPONSIVE — MOBILE ══ */
@media(max-width:480px){
  .hi{padding:28px 14px 24px}
  .nw{padding:0 10px;margin-top:-18px}
  .mn{padding:0 10px 100px}
  .hero h1{font-size:19px;line-height:1.35}
  .hst{font-size:12px;margin-bottom:14px}
  .hero-badge{font-size:10px;padding:4px 12px}
  .hch{gap:5px}
  .ch{font-size:11px;padding:4px 10px}

  /* Nav scrollable on mobile */
  .nb{padding:3px;gap:2px;border-radius:12px}
  .nt{padding:8px 12px;font-size:11px;border-radius:8px}
  body.editing .nt{padding-right:24px}
  .tab-arr{width:16px;height:16px;font-size:7px;border-width:1.5px}

  /* Edit bar stacked */
  .ebar{padding:8px 10px;gap:6px}
  .ebl{font-size:11px}
  .eba{width:100%;justify-content:center}
  .eba .bb{flex:1;text-align:center;padding:6px 6px;font-size:10px;min-width:0}

  /* Cards */
  .card{border-radius:10px;margin-bottom:12px}
  .ct{padding:10px 12px;gap:8px}
  .cn{min-width:30px;height:30px;border-radius:8px;font-size:12px}
  .ct h3{font-size:12px}
  .cbody{padding:12px}
  .cba button{width:22px;height:22px;font-size:10px}

  /* Section title */
  .stt{gap:10px;margin-bottom:16px;padding-bottom:12px}
  .sti{width:36px;height:36px;border-radius:10px;font-size:16px}
  .stt h2{font-size:15px}
  .stt p{font-size:11px}

  /* Info grid single column */
  .ig{grid-template-columns:1fr;gap:8px}
  .ic{padding:10px 12px}
  .ic .fl{font-size:9px}
  .ic .iv{font-size:13px}

  /* Images 2 columns on mobile */
  .img-grid{grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
  .img-slot{border-radius:8px}
  .img-ph{font-size:10px;padding:10px}
  .img-ph svg{width:28px;height:28px}
  .img-x{width:22px;height:22px;font-size:11px;top:4px;right:4px}

  /* Checklist */
  .cln{width:24px;height:24px;font-size:10px;border-radius:6px}
  .clt{font-size:13px}
  .cld{padding-left:34px;font-size:12px}

  /* Block header */
  .bk-header{padding:16px;border-radius:10px}
  .bk-header h3{font-size:14px}
  .bk-header p{font-size:12px}

  /* Result box */
  .rb{padding:10px 12px;margin-top:10px}

  /* Add block */
  .add-block-btn{padding:10px 20px;font-size:12px;border-radius:10px}

  /* Modals */
  .mb{padding:20px;border-radius:14px}
  .mb h3{font-size:16px}
  .mb input,.mb select{padding:9px 12px;font-size:13px}
  .mba button{padding:10px;font-size:12px}

  /* Editable */
  body.editing .ed{padding:4px 8px;font-size:13px}

  /* Lightbox */
  .lbox img{max-width:98%;max-height:80vh;border-radius:8px}
  .lbox-close{top:10px;right:10px;width:36px;height:36px;font-size:20px}

  /* FAB */
  .fab{width:48px;height:48px;bottom:20px;right:16px}
  .fab svg{width:18px;height:18px}

  /* Toast */
  .toast{font-size:12px;padding:10px 20px;bottom:20px}
}

/* ══ VERY SMALL SCREENS ══ */
@media(max-width:360px){
  .hero h1{font-size:17px}
  .nt{padding:6px 8px;font-size:10px}
  .img-grid{grid-template-columns:1fr 1fr;gap:6px}
  .ig{gap:6px}
  .eba .bb{font-size:9px;padding:5px 4px}
}

@media print{.fab,.ebar,.nw,.add-block-area,.add-inline,.cba,.img-overlay,.img-x,.tab-arrows{display:none!important}.tp{display:block!important;page-break-before:always}.card{box-shadow:none;border:1px solid #ddd;break-inside:avoid}}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- LIGHTBOX -->
<div class="lbox" id="lbox" onclick="closeLB(event)">
  <button class="lbox-close" onclick="document.getElementById('lbox').classList.remove('show')">✕</button>
  <img id="lboxImg">
  <div class="lbox-info" id="lboxInfo"></div>
</div>

<!-- MODALS -->
<div class="ov" id="mPw"><div class="mb">
  <h3>🔐 เข้าสู่โหมดแก้ไข</h3><p class="mdesc">รหัสผ่านเริ่มต้น: 1234</p>
  <input type="password" id="iPw" placeholder="••••••" onkeydown="if(event.key==='Enter')chkPw()">
  <div class="er" id="ePw"></div>
  <div class="mba"><button class="bc" onclick="cl('mPw')">ยกเลิก</button><button class="bu" onclick="chkPw()">เข้าสู่โหมดแก้ไข</button></div>
</div></div>

<div class="ov" id="mSt"><div class="mb">
  <h3>⚙️ ตั้งค่ารายงาน</h3><p class="mdesc">แก้ไขข้อมูลหัวรายงานและรหัสผ่าน</p>
  <label>ชื่อรายงาน</label><input id="sTitle"><label>คำอธิบาย</label><input id="sSub">
  <label>โรงเรียน</label><input id="sSchool"><label>ตำแหน่ง</label><input id="sPos">
  <label>ช่วงเวลา</label><input id="sPeriod"><label>รหัสผ่านใหม่ (เว้นว่าง=ไม่เปลี่ยน)</label><input type="password" id="sNewPw">
  <div class="mba"><button class="bc" onclick="cl('mSt')">ยกเลิก</button><button class="bgo" onclick="saveSettings()">บันทึก</button></div>
</div></div>

<div class="ov" id="mAb"><div class="mb">
  <h3>➕ เพิ่ม Block</h3><p class="mdesc">เลือกประเภทและหัวข้อ</p>
  <label>ประเภท</label>
  <select id="abType"><option value="text-only">📝 ข้อความ</option><option value="text-images">📝🖼️ ข้อความ+รูป</option><option value="images-only">🖼️ รูปภาพ</option><option value="info-grid">📊 ตาราง</option><option value="header">📌 หัวข้อคั่น</option><option value="checklist">✅ Checklist</option></select>
  <label>หัวข้อ</label><input id="abTitle" placeholder="ชื่อหัวข้อ">
  <div class="mba"><button class="bc" onclick="cl('mAb')">ยกเลิก</button><button class="bu" onclick="confirmAddBlock()">เพิ่ม</button></div>
</div></div>

<div class="ov" id="mAs"><div class="mb">
  <h3>📂 เพิ่ม Tab ใหม่</h3><p class="mdesc">สร้าง Section ใหม่</p>
  <label>ชื่อ Tab</label><input id="asTab" placeholder="เช่น ภาคผนวก">
  <label>ไอคอน</label><input id="asIcon" value="📄" style="max-width:80px">
  <label>หัวข้อรอง</label><input id="asHead" placeholder="(ไม่บังคับ)">
  <div class="mba"><button class="bc" onclick="cl('mAs')">ยกเลิก</button><button class="bu" onclick="confirmAddSection()">เพิ่ม</button></div>
</div></div>

<!-- EDIT BAR -->
<div class="ebar">
  <div class="ebl"><div class="dot"></div>โหมดแก้ไข</div>
  <div class="eba">
    <button class="bb bpl" onclick="op('mAs')">📂 +Tab</button>
    <button class="bb bst" onclick="openSettings()">⚙️ ตั้งค่า</button>
    <button class="bb bsv" onclick="saveToSheet()">💾 บันทึก</button>
    <button class="bb bex" onclick="exitEdit()">✕ ออก</button>
  </div>
</div>

<button class="fab" onclick="op('mPw')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>

<header class="hero"><div class="hi">
  <div class="hero-badge"><span></span>ระบบรายงานผลการปฏิบัติงาน</div>
  <h1 id="heroTitle"></h1><p class="hst" id="heroSub"></p><div class="hch" id="heroChips"></div>
</div></header>

<div class="nw"><div class="nb" id="navBar"></div></div>
<div class="mn" id="mainContent"></div>

<!-- HIDDEN FILE INPUT — supports multiple -->
<input type="file" id="fileInput" accept="image/*" multiple style="display:none">

<script>
let D={},IMGS={},activeTab='',imgTarget=null,API='https://script.google.com/macros/s/AKfycbx7QLgz3vpuDEDGWEH-sACcVm9v-bJlp9nkvrxvauioLCgf-0qHN8uHhFrhCxQo2U4t/exec';

function getApi(){return API}
function imgUrl(id){return IMGS[id]?IMGS[id].url:''}

// ══ LOAD / SAVE — Sheets Only ══
async function loadFromSheet(){
  const url=getApi();
  try{showLoading('กำลังโหลดข้อมูลจาก Google Sheets...');
    const r=await fetch(url,{redirect:'follow'});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const j=await r.json();
    if(j.status==='ok'){
      D={};for(const[k,v]of Object.entries(j.data||{}))D[k]=(typeof v==='string')?JSON.parse(v):v;
      IMGS=j.images||{};
      activeTab='';render();
    }else{showError(j.message||'โหลดข้อมูลไม่ได้')}
  }catch(e){showError(e.message)}
}

async function saveToSheet(){
  const url=getApi();
  collect();
  try{toast('☁️ กำลังบันทึก...');
    const r=await fetch(url,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'save_all',data:D})});
    const j=await r.json();toast(j.status==='ok'?'💾 บันทึกแล้ว':'❌ '+j.message);
  }catch(e){toast('❌ '+e.message)}
}

async function uploadImage(base64,blockId){
  const url=getApi();
  const id='img_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
  const fn=id+'.jpg';
  const r=await fetch(url,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'upload_image',base64,fileName:fn,image_id:id,block_id:blockId})});
  const j=await r.json();
  if(j.status==='ok'){IMGS[j.image_id]={id:j.image_id,url:j.url};return j.image_id}
  throw new Error(j.message||'Upload failed');
}

async function deleteImage(imageId){
  const url=getApi();
  fetch(url,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'delete_image',image_id:imageId})}).catch(()=>{});
  delete IMGS[imageId];
}

// ══ LOADING / ERROR ══
function showError(msg){
  document.getElementById('mainContent').innerHTML=`<div style="max-width:480px;margin:40px auto;text-align:center;padding:20px">
    <div style="font-size:48px;margin-bottom:16px">⚠️</div>
    <h2 style="font-family:'Mitr',sans-serif;color:var(--red);font-size:18px;margin-bottom:8px">โหลดข้อมูลไม่สำเร็จ</h2>
    <p style="color:var(--ts);font-size:13px;margin-bottom:20px">${esc(msg)}</p>
    <button onclick="loadFromSheet()" style="padding:12px 32px;background:var(--f);color:#fff;border:none;border-radius:10px;font-family:'Mitr',sans-serif;font-size:14px;cursor:pointer">ลองใหม่</button>
  </div>`;
}
function showLoading(m){document.getElementById('mainContent').innerHTML=`<div style="text-align:center;padding:60px"><div style="width:40px;height:40px;border:3px solid var(--bd);border-top-color:var(--fl);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px"></div><p style="color:var(--ts)">${esc(m)}</p></div>`;document.getElementById('navBar').innerHTML=''}

// ══ FILE INPUT ══
document.getElementById('fileInput').addEventListener('change',function(e){
  const files=Array.from(e.target.files);if(!files.length||!imgTarget)return;
  let done=0;const total=files.length;toast('📤 อัปโหลด '+total+' รูป...');
  files.forEach(file=>{const reader=new FileReader();reader.onload=function(ev){
    const img=new Image();img.onload=function(){
      const c=document.createElement('canvas');const M=1024;let w=img.width,h=img.height;
      if(w>M){h=h*(M/w);w=M}if(h>M){w=w*(M/h);h=M}c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      uploadImage(c.toDataURL('image/jpeg',.75),imgTarget.blockId).then(id=>{
        imgTarget.cb(id);done++;
        if(done===total){imgTarget=null;saveToSheet();render();enableEdit();toast('📷 อัปโหลด '+total+' รูปแล้ว')}
      }).catch(er=>{toast('❌ '+er.message);done++;if(done===total)imgTarget=null});
    };img.src=ev.target.result;
  };reader.readAsDataURL(file)});e.target.value='';
});

// ══ INIT ══
function secKeys(){return Object.keys(D).filter(k=>k.startsWith('sec_')).sort((a,b)=>parseInt(a.split('_')[1])-parseInt(b.split('_')[1]))}
document.addEventListener('DOMContentLoaded',()=>loadFromSheet());

// ══ RENDER ══
function render(){renderHero();renderNav();renderSections();if(activeTab&&document.getElementById('tab-'+activeTab))switchTab(activeTab);else{const k=secKeys();if(k.length)switchTab(k[0])}}
function renderHero(){const s=D.settings||{};document.getElementById('heroTitle').textContent=s.title||'รายงานผลการปฏิบัติงาน';document.getElementById('heroSub').textContent=s.subtitle||'';let c='';if(s.position)c+=`<div class="ch">👤 ${esc(s.position)}</div>`;if(s.period)c+=`<div class="ch">📅 ${esc(s.period)}</div>`;if(s.school)c+=`<div class="ch">🏫 ${esc(s.school)}</div>`;document.getElementById('heroChips').innerHTML=c}
function renderNav(){const keys=secKeys();let h='';const ed=document.body.classList.contains('editing');keys.forEach((k,i)=>{const sec=D[k],cls=k===activeTab?' active':'';let arr='';if(ed)arr=`<div class="tab-arrows">${i>0?`<button class="tab-arr" onclick="event.stopPropagation();moveTab('${k}',-1)">◀</button>`:''}<button class="tab-arr" onclick="event.stopPropagation();moveTab('${k}',1)">▶</button><button class="tab-arr tab-del" onclick="event.stopPropagation();delTab('${k}')">✕</button></div>`;h+=`<button class="nt${cls}" onclick="switchTab('${k}')">${sec.icon||'📄'} ${esc(sec.tab||k)}${arr}</button>`});document.getElementById('navBar').innerHTML=h}
function renderSections(){const keys=secKeys();let h='';keys.forEach(k=>{const sec=D[k],cls=k===activeTab?' active':'';h+=`<div class="tp${cls}" id="tab-${k}"><div class="stt"><div class="sti">${sec.icon||'📄'}</div><div><h2>${esc(sec.tab||'')}</h2>${sec.heading?`<p>${esc(sec.heading)}</p>`:''}</div></div>`;if(sec.blocks)sec.blocks.forEach((b,i)=>{h+=renderBlock(k,b,i)});h+=`<div class="add-block-area"><button class="add-block-btn" onclick="openAddBlock('${k}')">➕ เพิ่ม Block</button></div></div>`});document.getElementById('mainContent').innerHTML=h}

function renderBlock(sk,b,idx){
  const t=b.type||'text-only',ed=document.body.classList.contains('editing');
  const eb=`<div class="cba">${idx>0?`<button onclick="moveBlock('${sk}',${idx},-1)">▲</button>`:''}<button onclick="moveBlock('${sk}',${idx},1)">▼</button><button class="del-btn" onclick="delBlock('${sk}',${idx})">✕</button></div>`;
  if(t==='header')return`<div class="bk-header"><h3>${esc(b.title||'')}</h3><p class="ed" data-s="${sk}" data-i="${idx}" data-f="content" data-ph="เนื้อหา...">${esc(b.content||'')}</p>${eb}</div>`;
  let inner='';
  if(t==='info-grid'){inner='<div class="ig">';Object.entries(b.data||{}).forEach(([k,v])=>{inner+=`<div class="ic"><div class="fl">${esc(k)}</div><div class="iv ed" data-s="${sk}" data-i="${idx}" data-f="data.${k}" data-ph="...">${esc(v)}</div></div>`});inner+='</div><div class="add-inline"><button class="add-inline-btn" onclick="addInfoField(\''+sk+'\','+idx+')">+ เพิ่มช่อง</button></div>'}
  if(t==='text-only'||t==='text-images'){inner+=`<div class="fl">📝 เนื้อหา</div><div class="ed" data-s="${sk}" data-i="${idx}" data-f="content" data-ph="เนื้อหา...">${esc(b.content||'')}</div><div class="rb"><div class="fl">⭐ ผลลัพธ์</div><div class="ed" data-s="${sk}" data-i="${idx}" data-f="sub" data-ph="ผลลัพธ์...">${esc(b.sub||'')}</div></div>`}
  // ── IMAGES: ใช้ image_id lookup จาก IMGS ──
  if(t==='text-images'||t==='images-only'){
    const ids=(b.images||[]).filter(id=>id&&imgUrl(id));
    if(ids.length||ed){
      if(ed)inner+='<div class="fl" style="margin-top:14px">🖼️ ภาพประกอบ</div>';
      inner+='<div class="img-grid">';
      ids.forEach((id,ii)=>{const url=imgUrl(id);if(url)inner+=`<div class="img-slot has-img"><img src="${esc(url)}" onclick="openLB('${sk}',${idx},${ii})"><button class="img-x" onclick="event.stopPropagation();delImg('${sk}',${idx},${ii})">✕</button></div>`});
      if(ed)inner+=`<div class="img-slot img-slot-upload" onclick="triggerUpload('${sk}',${idx})" ondragover="event.preventDefault();this.classList.add('dragover')" ondragleave="this.classList.remove('dragover')" ondrop="handleDrop(event,'${sk}',${idx})"><div class="img-ph"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>คลิกหรือลากรูปมาวาง</div></div>`;
      inner+='</div>';
    }
  }
  if(t==='checklist'){(b.items||[]).forEach((it,ii)=>{inner+=`<div class="cli"><div class="clh"><div class="cln">${ii+1}</div><div class="clt ed" data-s="${sk}" data-i="${idx}" data-f="items.${ii}.label" data-ph="หัวข้อ...">${esc(it.label||'')}</div></div><div class="cld ed" data-s="${sk}" data-i="${idx}" data-f="items.${ii}.desc" data-ph="รายละเอียด...">${esc(it.desc||'')}</div></div>`});inner+=`<div class="add-inline"><button class="add-inline-btn" onclick="addCheckItem('${sk}',${idx})">+ เพิ่มรายการ</button></div>`}
  return`<div class="card"><div class="ct"><div class="cn">${tIcon(t)}</div><h3 class="ed" data-s="${sk}" data-i="${idx}" data-f="title" data-ph="หัวข้อ...">${esc(b.title||'')}</h3>${eb}</div><div class="cbody">${inner}</div></div>`;
}
function tIcon(t){return{'text-only':'📝','text-images':'🖼️','images-only':'🖼️','info-grid':'📊','header':'📌','checklist':'✅'}[t]||'📄'}

// ══ IMAGE ══
function triggerUpload(sk,bi){if(!document.body.classList.contains('editing'))return;collect();const blockId=D[sk].blocks[bi].id||'';imgTarget={blockId,cb:id=>{if(!D[sk].blocks[bi].images)D[sk].blocks[bi].images=[];D[sk].blocks[bi].images.push(id)}};document.getElementById('fileInput').click()}
function handleDrop(e,sk,bi){e.preventDefault();e.currentTarget.classList.remove('dragover');if(!document.body.classList.contains('editing'))return;const files=Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/'));if(!files.length)return;collect();const blockId=D[sk].blocks[bi].id||'';let done=0;toast('📤 อัปโหลด...');files.forEach(file=>{const reader=new FileReader();reader.onload=ev=>{const img=new Image();img.onload=function(){const c=document.createElement('canvas');const M=1024;let w=img.width,h=img.height;if(w>M){h=h*(M/w);w=M}if(h>M){w=w*(M/h);h=M}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);if(!D[sk].blocks[bi].images)D[sk].blocks[bi].images=[];uploadImage(c.toDataURL('image/jpeg',.75),blockId).then(id=>{D[sk].blocks[bi].images.push(id);done++;if(done===files.length){saveToSheet();render();enableEdit();toast('📷 เพิ่ม '+files.length+' รูป')}}).catch(()=>{done++;if(done===files.length)toast('❌ อัปโหลดไม่สำเร็จ')})};img.src=ev.target.result};reader.readAsDataURL(file)})}
function delImg(sk,bi,ii){if(!confirm('ลบรูปนี้?'))return;collect();const id=D[sk].blocks[bi].images[ii];D[sk].blocks[bi].images.splice(ii,1);deleteImage(id);saveToSheet();render();enableEdit()}
function openLB(sk,bi,ii){const ids=D[sk]?.blocks?.[bi]?.images||[];const url=imgUrl(ids[ii]);if(!url)return;document.getElementById('lboxImg').src=url;document.getElementById('lboxInfo').textContent='รูปที่ '+(ii+1)+' / '+ids.length;document.getElementById('lbox').classList.add('show')}
function closeLB(e){if(e.target===e.currentTarget||e.target.tagName!=='IMG')document.getElementById('lbox').classList.remove('show')}

// ══ TAB / EDIT ══
function switchTab(k){if(document.body.classList.contains('editing'))collect();activeTab=k;renderNav();renderSections();const t=document.getElementById('tab-'+k);if(t)t.classList.add('active');if(document.body.classList.contains('editing'))enableEdit()}
function moveTab(k,dir){collect();const keys=secKeys(),idx=keys.indexOf(k),ni=idx+dir;if(ni<0||ni>=keys.length)return;const nA=parseInt(keys[idx].split('_')[1]),nB=parseInt(keys[ni].split('_')[1]);const a=D[keys[idx]],b=D[keys[ni]];D['sec_'+nA]=b;D['sec_'+nB]=a;activeTab='sec_'+nB;saveToSheet();render();enableEdit()}
function delTab(k){if(!confirm('ลบ Tab?'))return;collect();delete D[k];activeTab=secKeys()[0]||'';saveToSheet();render();if(document.body.classList.contains('editing'))enableEdit()}
function collect(){document.querySelectorAll('.ed[data-s]').forEach(el=>{const sk=el.dataset.s,bi=parseInt(el.dataset.i),f=el.dataset.f,v=el.textContent.trim();if(!D[sk]?.blocks?.[bi])return;const b=D[sk].blocks[bi];if(f.startsWith('data.')){if(!b.data)b.data={};b.data[f.slice(5)]=v}else if(f.startsWith('items.')){const p=f.split('.');if(b.items?.[parseInt(p[1])])b.items[parseInt(p[1])][p[2]]=v}else b[f]=v})}
function chkPw(){if(document.getElementById('iPw').value===(D.settings||{}).password||'1234'){cl('mPw');document.body.classList.add('editing');render();enableEdit();toast('🔓 โหมดแก้ไข')}else{document.getElementById('ePw').textContent='รหัสผ่านไม่ถูกต้อง';document.getElementById('iPw').value=''}}
function enableEdit(){document.querySelectorAll('.ed').forEach(el=>el.contentEditable='true')}
function exitEdit(){collect();saveToSheet();document.body.classList.remove('editing');render()}
function moveBlock(sk,i,dir){collect();const bl=D[sk].blocks,ni=i+dir;if(ni<0||ni>=bl.length)return;[bl[i],bl[ni]]=[bl[ni],bl[i]];saveToSheet();render();enableEdit()}
function delBlock(sk,i){if(!confirm('ลบ?'))return;collect();D[sk].blocks.splice(i,1);saveToSheet();render();enableEdit()}
let addBlockTarget='';
function openAddBlock(sk){addBlockTarget=sk;document.getElementById('abTitle').value='';op('mAb')}
function confirmAddBlock(){const type=document.getElementById('abType').value,title=document.getElementById('abTitle').value.trim()||'หัวข้อใหม่';collect();if(!D[addBlockTarget].blocks)D[addBlockTarget].blocks=[];const nb={id:'b'+Date.now(),type,title};if(type==='text-only'||type==='text-images'){nb.content='';nb.sub=''}if(type==='text-images'||type==='images-only')nb.images=[];if(type==='info-grid')nb.data={'หัวข้อ':''};if(type==='checklist')nb.items=[{label:'',desc:''}];if(type==='header')nb.content='';D[addBlockTarget].blocks.push(nb);cl('mAb');saveToSheet();render();enableEdit()}
function addInfoField(sk,bi){const n=prompt('ชื่อช่อง:');if(!n)return;collect();if(!D[sk].blocks[bi].data)D[sk].blocks[bi].data={};D[sk].blocks[bi].data[n]='';saveToSheet();render();enableEdit()}
function addCheckItem(sk,bi){collect();D[sk].blocks[bi].items.push({label:'',desc:''});saveToSheet();render();enableEdit()}
function confirmAddSection(){const tab=document.getElementById('asTab').value.trim()||'หน้าใหม่',icon=document.getElementById('asIcon').value.trim()||'📄',heading=document.getElementById('asHead').value.trim();collect();const mx=secKeys().reduce((m,k)=>Math.max(m,parseInt(k.split('_')[1])||0),0);D['sec_'+(mx+1)]={tab,icon,heading,blocks:[]};cl('mAs');activeTab='sec_'+(mx+1);saveToSheet();render();enableEdit();toast('📂 เพิ่ม "'+tab+'"')}
function openSettings(){const s=D.settings||{};document.getElementById('sTitle').value=s.title||'';document.getElementById('sSub').value=s.subtitle||'';document.getElementById('sSchool').value=s.school||'';document.getElementById('sPos').value=s.position||'';document.getElementById('sPeriod').value=s.period||'';document.getElementById('sNewPw').value='';op('mSt')}
function saveSettings(){if(!D.settings)D.settings={};D.settings.title=document.getElementById('sTitle').value;D.settings.subtitle=document.getElementById('sSub').value;D.settings.school=document.getElementById('sSchool').value;D.settings.position=document.getElementById('sPos').value;D.settings.period=document.getElementById('sPeriod').value;const np=document.getElementById('sNewPw').value;if(np)D.settings.password=np;cl('mSt');saveToSheet();renderHero();toast('⚙️ บันทึกแล้ว')}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function op(id){document.getElementById(id).classList.add('show');if(id==='mPw'){document.getElementById('iPw').value='';document.getElementById('ePw').textContent='';setTimeout(()=>document.getElementById('iPw').focus(),200)}}
function cl(id){document.getElementById(id).classList.remove('show')}
</script>
</body>
</html>
